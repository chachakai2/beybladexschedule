<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="陀螺賽事">
<meta name="theme-color" content="#f5c842">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<title>陀螺比賽行程表</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0e0f14; --surface:#16181f; --surface2:#1e2028;
    --border:rgba(255,255,255,0.07); --border2:rgba(255,255,255,0.13);
    --text:#e8eaf0; --muted:#7a7f94;
    --accent:#f5c842; --accent2:#e8834a;
    --tc:#5b9cf6; --ch:#52c87a; --nt:#c77dff;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html{height:100%;}
  body{
    background:var(--bg);color:var(--text);
    font-family:'Noto Sans TC',sans-serif;
    font-size:14px;line-height:1.6;
    min-height:100%;
    padding-bottom:env(safe-area-inset-bottom);
  }

  /* HEADER */
  .header{
    position:sticky;top:0;z-index:100;
    background:rgba(14,15,20,0.93);
    backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
    border-bottom:1px solid var(--border);
    padding:0 16px;
    padding-top:env(safe-area-inset-top);
    height:calc(56px + env(safe-area-inset-top));
    display:flex;align-items:flex-end;padding-bottom:10px;
    gap:10px;
  }
  .logo{width:30px;height:30px;border-radius:8px;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
  .header-info{flex:1;min-width:0;}
  .header-title{font-size:15px;font-weight:700;color:var(--text);}
  .header-sub{font-size:11px;color:var(--muted);font-family:'DM Mono',monospace;}
  .search-wrap{position:relative;}
  .search-input{
    background:var(--surface2);border:1px solid var(--border);
    border-radius:20px;padding:7px 12px 7px 30px;
    color:var(--text);font-family:'Noto Sans TC',sans-serif;font-size:13px;
    width:140px;outline:none;
  }
  .search-input::placeholder{color:var(--muted);}
  .search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:13px;pointer-events:none;}

  /* BOTTOM NAV */
  .bottom-nav{
    position:fixed;bottom:0;left:0;right:0;z-index:200;
    background:rgba(14,15,20,0.95);
    backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
    border-top:1px solid var(--border);
    display:flex;
    padding-bottom:env(safe-area-inset-bottom);
  }
  .nav-btn{
    flex:1;display:flex;flex-direction:column;align-items:center;
    padding:10px 4px;border:none;background:transparent;
    color:var(--muted);font-family:'Noto Sans TC',sans-serif;
    font-size:10px;cursor:pointer;gap:3px;transition:color 0.15s;
  }
  .nav-btn.active{color:var(--accent);}
  .nav-icon{font-size:20px;line-height:1;}

  /* MAIN */
  .main{
    padding:16px 12px;
    padding-bottom:calc(70px + env(safe-area-inset-bottom));
  }

  /* STATS ROW */
  .stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px;}
  .stat{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px 6px;text-align:center;}
  .stat-num{font-size:20px;font-weight:700;font-family:'DM Mono',monospace;line-height:1.2;}
  .stat-lbl{font-size:10px;color:var(--muted);margin-top:2px;}

  /* FILTER CHIPS */
  .filter-section{margin-bottom:12px;}
  .filter-label{font-size:11px;color:var(--muted);letter-spacing:0.06em;text-transform:uppercase;margin-bottom:8px;}
  .chips{display:flex;gap:6px;flex-wrap:wrap;}
  .chip{
    padding:5px 12px;border-radius:20px;
    border:1px solid var(--border);background:var(--surface);
    color:var(--muted);font-size:12px;cursor:pointer;
    transition:all 0.15s;white-space:nowrap;
    font-family:'Noto Sans TC',sans-serif;
  }
  .chip.active{background:var(--accent);color:#1a1400;border-color:var(--accent);font-weight:700;}

  /* CARDS */
  .week-group{margin-bottom:20px;}
  .week-header{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
  .week-line{flex:1;height:1px;background:var(--border);}
  .week-tag{font-size:11px;font-family:'DM Mono',monospace;color:var(--muted);white-space:nowrap;padding:3px 10px;border:1px solid var(--border);border-radius:20px;background:var(--surface);}

  .card{
    background:var(--surface);border:1px solid var(--border);
    border-radius:12px;padding:14px;margin-bottom:10px;
    animation:fadeUp 0.25s ease both;
  }
  @keyframes fadeUp{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
  .card-head{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:8px;}
  .store{font-size:15px;font-weight:700;color:var(--text);}
  .badges{display:flex;gap:4px;flex-wrap:wrap;justify-content:flex-end;}
  .badge{font-size:10px;padding:2px 7px;border-radius:20px;font-weight:500;white-space:nowrap;}
  .badge-tc{background:rgba(91,156,246,0.15);color:var(--tc);}
  .badge-ch{background:rgba(82,200,122,0.15);color:var(--ch);}
  .badge-open{background:rgba(245,200,66,0.12);color:var(--accent);}
  .badge-normal{background:rgba(82,200,122,0.12);color:var(--ch);}
  .card-info{display:flex;flex-wrap:wrap;gap:6px 12px;margin-bottom:10px;}
  .info-item{display:flex;align-items:center;gap:4px;font-size:12px;color:var(--muted);}
  .addr{font-size:11px;color:var(--muted);margin-bottom:10px;padding:6px 8px;background:var(--surface2);border-radius:6px;}
  .card-footer{display:flex;align-items:center;justify-content:space-between;}
  .reg-tag{font-size:11px;color:var(--muted);display:flex;align-items:center;gap:4px;}
  .phone-link{
    font-family:'DM Mono',monospace;font-size:12px;color:var(--accent);
    text-decoration:none;padding:6px 12px;
    border:1px solid rgba(245,200,66,0.3);border-radius:8px;
    background:rgba(245,200,66,0.06);
  }

  /* VIEWS */
  .view{display:none;}
  .view.active{display:block;}

  /* SETTINGS VIEW */
  .settings-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:12px;}
  .settings-title{font-size:13px;font-weight:700;color:var(--text);margin-bottom:12px;}
  .settings-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);}
  .settings-row:last-child{border-bottom:none;}
  .settings-key{font-size:13px;color:var(--muted);}
  .settings-val{font-size:13px;color:var(--text);font-family:'DM Mono',monospace;}

  .empty{text-align:center;padding:48px 20px;color:var(--muted);}
  .empty-icon{font-size:40px;margin-bottom:10px;opacity:0.4;}

  ::-webkit-scrollbar{width:4px;}
  ::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}
</style>
</head>

<header class="header">
  <div class="logo">🪀</div>
  <div class="header-info">
    <div class="header-title">陀螺比賽行程表</div>
    <div class="header-sub">台中・彰化・南投</div>
  </div>
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input class="search-input" type="search" placeholder="搜尋…" id="searchInput" oninput="render()">
  </div>
</header>

<!-- VIEWS -->
<div class="main">
  <!-- HOME VIEW -->
  <div class="view active" id="view-home">
    <div class="stats-row" id="statsRow"></div>

    <div class="filter-section">
      <div class="filter-label">月份</div>
      <div class="chips" id="monthChips"></div>
    </div>
    <div class="filter-section">
      <div class="filter-label">地區</div>
      <div class="chips">
        <button class="chip active" data-region="all" onclick="setF('region','all')">全部</button>
        <button class="chip" data-region="台中" onclick="setF('region','台中')">台中</button>
        <button class="chip" data-region="彰化" onclick="setF('region','彰化')">彰化</button>
        <button class="chip" data-region="南投" onclick="setF('region','南投')">南投</button>
      </div>
    </div>
    <div class="filter-section">
      <div class="filter-label">賽制</div>
      <div class="chips">
        <button class="chip active" data-type="all" onclick="setF('type','all')">全部</button>
        <button class="chip" data-type="公開" onclick="setF('type','公開')">公開 6歲↑</button>
        <button class="chip" data-type="通常" onclick="setF('type','通常')">通常 6~12歲</button>
      </div>
    </div>
    <div class="filter-section">
      <div class="filter-label">報名方式</div>
      <div class="chips">
        <button class="chip active" data-reg="all" onclick="setF('reg','all')">全部</button>
        <button class="chip" data-reg="現場" onclick="setF('reg','現場')">現場</button>
        <button class="chip" data-reg="線上" onclick="setF('reg','線上')">線上</button>
        <button class="chip" data-reg="門市社群" onclick="setF('reg','門市社群')">門市社群</button>
        <button class="chip" data-reg="皆可" onclick="setF('reg','皆可')">皆可</button>
        <button class="chip" data-reg="電話" onclick="setF('reg','電話')">電話</button>
      </div>
    </div>

    <div id="content"></div>
  </div>

  <!-- CALENDAR VIEW (simple list by date) -->
  <div class="view" id="view-calendar">
    <div id="calContent"></div>
  </div>

  <!-- SETTINGS VIEW -->
  <div class="view" id="view-settings">
    <div class="settings-card">
      <div class="settings-title">關於</div>
      <div class="settings-row"><span class="settings-key">版本</span><span class="settings-val">1.0.0</span></div>
      <div class="settings-row"><span class="settings-key">地區</span><span class="settings-val">台中・彰化・南投</span></div>
      <div class="settings-row"><span class="settings-key">賽季</span><span class="settings-val">2026 年</span></div>
      <div class="settings-row"><span class="settings-key">場次總數</span><span class="settings-val" id="totalCount">-</span></div>
    </div>
    <div class="settings-card">
      <div class="settings-title">安裝說明</div>
      <div style="font-size:13px;color:var(--muted);line-height:1.8;">
        <p>📱 <b style="color:var(--text)">iOS Safari：</b><br>點底部分享按鈕 → 「加入主畫面」</p>
        <br>
        <p>🤖 <b style="color:var(--text)">Android Chrome：</b><br>點右上角選單 → 「新增到主畫面」</p>
      </div>
    </div>
  </div>
</div>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
  <button class="nav-btn active" id="nav-home" onclick="switchView('home')">
    <span class="nav-icon">🏠</span>賽事
  </button>
  <button class="nav-btn" id="nav-calendar" onclick="switchView('calendar')">
    <span class="nav-icon">📅</span>日曆
  </button>
  <button class="nav-btn" id="nav-settings" onclick="switchView('settings')">
    <span class="nav-icon">⚙️</span>設定
  </button>
</nav>

  {store:'森森文具玩具',date:'2026/6/14',time:'15:00',cap:32,reg:'線上',type:'公開',addr:'台中市后里區成功路356號',region:'台中',phone:'(04)2558-9226'},
  {store:'大利市員林',date:'2026/5/30',time:'14:00',cap:32,reg:'現場',type:'公開',addr:'彰化縣員林市溝皂東街32號',region:'彰化',phone:'04-8343399'},
  {store:'大利市員林',date:'2026/6/20',time:'14:00',cap:32,reg:'現場',type:'公開',addr:'彰化縣員林市溝皂東街32號',region:'彰化',phone:'04-8343399'},
  {store:'遛小孩',date:'2026/6/7',time:'15:00',cap:32,reg:'皆可',type:'公開',addr:'彰化縣彰化市茄苳路一段303巷106-1號',region:'彰化',phone:'04-7280556'},
  {store:'遛小孩',date:'2026/6/14',time:'15:00',cap:32,reg:'皆可',type:'通常',addr:'彰化縣彰化市茄苳路一段303巷106-1號',region:'彰化',phone:'04-7280556'},
  {store:'遛小孩',date:'2026/6/21',time:'15:00',cap:32,reg:'皆可',type:'公開',addr:'彰化縣彰化市茄苳路一段303巷106-1號',region:'彰化',phone:'04-7280556'},
  {store:'遛小孩',date:'2026/6/28',time:'15:00',cap:32,reg:'皆可',type:'通常',addr:'彰化縣彰化市茄苳路一段303巷106-1號',region:'彰化',phone:'04-7280556'},
];

const WD=['日','一','二','三','四','五','六'];
let F={region:'all',type:'all',reg:'all',month:'all'};
let curView='home';

function getMonth(d){return d.slice(0,7);}

function setF(key,val){
  F[key]=val;
  document.querySelectorAll(`[data-${key}]`).forEach(b=>b.classList.toggle('active',b.dataset[key]===val));
  render();
}

function switchView(v){
  curView=v;
  document.querySelectorAll('.view').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(el=>el.classList.remove('active'));
  document.getElementById('view-'+v).classList.add('active');
  document.getElementById('nav-'+v).classList.add('active');
  if(v==='calendar') renderCal();
}

function filtered(){
  const q=document.getElementById('searchInput').value.toLowerCase();
  return ALL.filter(e=>{
    if(F.region!=='all'&&e.region!==F.region)return false;
    if(F.type!=='all'&&!e.type.includes(F.type))return false;
    if(F.reg!=='all'&&e.reg!==F.reg)return false;
    if(F.month!=='all'&&getMonth(e.date)!==F.month)return false;
    if(q&&!e.store.includes(q)&&!e.addr.includes(q)&&!e.region.includes(q))return false;
    return true;
  }).sort((a,b)=>a.date.localeCompare(b.date)||a.time.localeCompare(b.time));
}

function cardHTML(e,i){
  const d=new Date(e.date.replace(/\//g,'-'));
  const wd=WD[d.getDay()];
  const md=e.date.replace('2026/','');
  const rc=e.region==='彰化'?'badge-ch':'badge-tc';
  const tc=e.type.includes('公開')||e.type==='開放'?'badge-open':'badge-normal';
  const tl=e.type.includes('公開')||e.type==='開放'?'公開 6歲↑':'通常 6~12歲';
  const regColors={現場:'#e8834a',線上:'#5b9cf6',門市社群:'#c77dff',皆可:'#52c87a',電話:'#f5c842'};
  const rc2=regColors[e.reg]||'var(--muted)';
  return `<div class="card" style="animation-delay:${i*0.04}s">
    <div class="card-head">
      <div class="store">${e.store}</div>
      <div class="badges"><span class="badge ${rc}">${e.region}</span><span class="badge ${tc}">${tl}</span></div>
    </div>
    <div class="card-info">
      <span class="info-item">📅 ${md}（${wd}）</span>
      <span class="info-item">🕐 ${e.time}</span>
      <span class="info-item">👥 上限 ${e.cap} 人</span>
    </div>
    <div class="addr">📍 ${e.addr}</div>
    <div class="card-footer">
      <span class="reg-tag" style="color:${rc2}">● ${e.reg}</span>
      <a class="phone-link" href="tel:${e.phone.replace(/[^\d]/g,'')}">${e.phone}</a>
    </div>
  </div>`;
}

function render(){
  const data=filtered();
  const tc=data.filter(e=>e.region==='台中').length;
  const ch=data.filter(e=>e.region==='彰化').length;

  document.getElementById('statsRow').innerHTML=`
    <div class="stat"><div class="stat-num">${data.length}</div><div class="stat-lbl">場次</div></div>
    <div class="stat"><div class="stat-num" style="color:var(--tc)">${tc}</div><div class="stat-lbl">台中</div></div>
    <div class="stat"><div class="stat-num" style="color:var(--ch)">${ch}</div><div class="stat-lbl">彰化</div></div>
    <div class="stat"><div class="stat-num" style="color:var(--nt)">0</div><div class="stat-lbl">南投</div></div>
  `;

  const months=[...new Set(ALL.map(e=>getMonth(e.date)))].sort();
  document.getElementById('monthChips').innerHTML=
    `<button class="chip ${F.month==='all'?'active':''}" data-month="all" onclick="setF('month','all')">全部</button>`+
    months.map(m=>{
      const p=m.split('/');
      return `<button class="chip ${F.month===m?'active':''}" data-month="${m}" onclick="setF('month','${m}')">${parseInt(p[1])}月</button>`;
    }).join('');

  document.getElementById('totalCount').textContent=ALL.length+' 場';

  if(!data.length){
    document.getElementById('content').innerHTML='<div class="empty"><div class="empty-icon">🔍</div><div>找不到賽事</div></div>';
    return;
  }

  // group by week
  const byWeek={};
  data.forEach(e=>{
    const d=new Date(e.date.replace(/\//g,'-'));
    const w=Math.ceil(d.getDate()/7);
    const mm=parseInt(e.date.split('/')[1]);
    const wl=['','第一週','第二週','第三週','第四週','第五週'];
    const k=`${mm}月 ${wl[w]}`;
    if(!byWeek[k])byWeek[k]=[];
    byWeek[k].push(e);
  });

  let i=0;
  document.getElementById('content').innerHTML=Object.entries(byWeek).map(([w,items])=>`
    <div class="week-group">
      <div class="week-header"><div class="week-line"></div><div class="week-tag">${w} · ${items.length}場</div><div class="week-line"></div></div>
      ${items.map(e=>cardHTML(e,i++)).join('')}
    </div>
  `).join('');
}

function renderCal(){
  const data=[...ALL].sort((a,b)=>a.date.localeCompare(b.date)||a.time.localeCompare(b.time));
  const byDate={};
  data.forEach(e=>{
    if(!byDate[e.date])byDate[e.date]=[];
    byDate[e.date].push(e);
  });
  let i=0;
  document.getElementById('calContent').innerHTML=Object.entries(byDate).map(([date,items])=>{
    const d=new Date(date.replace(/\//g,'-'));
    const wd=WD[d.getDay()];
    const md=date.replace('2026/','');
    return `<div style="margin-bottom:16px">
      <div style="font-size:13px;font-weight:700;color:var(--accent);margin-bottom:8px;font-family:'DM Mono',monospace;">${md}（${wd}） · ${items.length}場</div>
      ${items.map(e=>cardHTML(e,i++)).join('')}
    </div>`;
  }).join('');
}

// Register SW
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}

render();
</script>
